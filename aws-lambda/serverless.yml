service: thfcscan-lambda

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  memorySize: 512
  timeout: 30
  environment:
    STAGE: ${self:provider.stage}
    REGION: ${self:provider.region}
  # VPC config — uncomment once Lightsail DB is provisioned:
  # vpc:
  #   securityGroupIds:
  #     - sg-XXXXXXXX
  #   subnetIds:
  #     - subnet-XXXXXXXX
  #     - subnet-YYYYYYYY
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - ssm:GetParameter
            - ssm:GetParameters
            - ssm:GetParametersByPath
          Resource:
            - arn:aws:ssm:${self:provider.region}:*:parameter/thfcscan/${self:provider.stage}/*
        - Effect: Allow
          Action:
            - secretsmanager:GetSecretValue
          Resource:
            - arn:aws:secretsmanager:${self:provider.region}:*:secret:/thfcscan/${self:provider.stage}/*
        - Effect: Allow
          Action:
            - cognito-idp:AdminGetUser
            - cognito-idp:AdminListGroupsForUser
          Resource:
            - arn:aws:cognito-idp:${self:provider.region}:*:userpool/*
        - Effect: Allow
          Action:
            - ses:SendEmail
            - ses:SendRawEmail
          Resource: '*'
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
          Resource:
            - arn:aws:s3:::thfcscan-storage-${self:provider.stage}/*
            - arn:aws:s3:::thfcscan-photo-archives-dev/*
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: '*'

plugins:
  - serverless-plugin-typescript
  - serverless-offline

functions:
  processDonation:
    handler: src/functions/process-donation.handler
    events:
      - http:
          path: /process-donation
          method: post
          cors: true
    environment:
      FUNCTION_NAME: process-donation

  sendDailySummary:
    handler: src/functions/send-daily-summary.handler
    events:
      - schedule:
          rate: cron(0 16 * * ? *)  # 4 PM UTC = 6 PM SAST
          enabled: true
    environment:
      FUNCTION_NAME: send-daily-summary

  triggerDailySummary:
    handler: src/functions/send-daily-summary.manualTrigger
    events:
      - http:
          path: /trigger-daily-summary
          method: post
          cors: true
    environment:
      FUNCTION_NAME: trigger-daily-summary

  editDonation:
    handler: src/functions/edit-donation.handler
    events:
      - http:
          path: /edit-donation
          method: put
          cors: true
    environment:
      FUNCTION_NAME: edit-donation

  generateExpiringShortcode:
    handler: src/functions/generate-expiring-shortcode.handler
    events:
      - http:
          path: /generate-shortcode
          method: post
          cors: true
    environment:
      FUNCTION_NAME: generate-expiring-shortcode

  refreshAllShortcodes:
    handler: src/functions/refresh-all-shortcodes.handler
    events:
      - http:
          path: /refresh-shortcodes
          method: post
          cors: true
    environment:
      FUNCTION_NAME: refresh-all-shortcodes

  passwordResetEmail:
    handler: src/functions/password-reset-email.handler
    events:
      - http:
          path: /password-reset-email
          method: post
          cors: true
    environment:
      FUNCTION_NAME: password-reset-email

  welcomeEmail:
    handler: src/functions/welcome-email.handler
    events:
      - http:
          path: /welcome-email
          method: post
          cors: true
    environment:
      FUNCTION_NAME: welcome-email

  debugEnv:
    handler: src/functions/debug-env.handler
    events:
      - http:
          path: /debug-env
          method: get
          cors: true
    environment:
      FUNCTION_NAME: debug-env

  uploadPhoto:
    handler: src/functions/upload-photo.handler
    events:
      - http:
          path: /upload-photo
          method: post
          cors: true
    environment:
      FUNCTION_NAME: upload-photo

resources:
  Resources:
    # S3 Bucket for file storage
    THFCScanStorageBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: thfcscan-storage-${self:provider.stage}
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders:
                - '*'
              AllowedMethods:
                - GET
                - PUT
                - POST
                - DELETE
              AllowedOrigins:
                - '*'
              MaxAge: 3000

    # API Gateway Custom Domain (optional)
    # THFCScanApiDomain:
    #   Type: AWS::ApiGateway::DomainName
    #   Properties:
    #     DomainName: api-${self:provider.stage}.thfcscan.com
    #     CertificateArn: arn:aws:acm:us-east-1:ACCOUNT:certificate/CERT-ID

custom:
  serverless-offline:
    httpPort: 3001
    host: 0.0.0.0

package:
  exclude:
    - .git/**
    - .vscode/**
    - '*.md'
    - .env*
    - jest.config.js
    - tsconfig.json
    - src/**/*.test.ts
    - src/**/*.spec.ts
  include:
    - src/**
    - package.json
    - node_modules/**