<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E8A6A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1F5F4A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#gradient)" stroke="#ffffff" stroke-width="1"/>
  
  <!-- Bread loaf icon -->
  <path d="M8 14c0-2.5 2-4.5 4.5-4.5h7c2.5 0 4.5 2 4.5 4.5v4c0 2.5-2 4.5-4.5 4.5h-7c-2.5 0-4.5-2-4.5-4.5v-4z" fill="#ffffff" opacity="0.9"/>
  
  <!-- Bread texture lines -->
  <path d="M10 16h12M10 18h12" stroke="#2E8A6A" stroke-width="0.5" opacity="0.6"/>
  
  <!-- Scanner line effect -->
  <rect x="6" y="12" width="20" height="1" fill="#ffffff" opacity="0.7">
    <animate attributeName="y" values="12;20;12" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" repeatCount="indefinite"/>
  </rect>
  
  <!-- THF initials -->
  <text x="16" y="26" font-family="Arial, sans-serif" font-size="6" font-weight="bold" text-anchor="middle" fill="#ffffff" opacity="0.8">THF</text>